# Render Blueprint for Girnar Gifts backend.
#
# The database is on a PAID plan (basic-256mb, ~$6-7/mo - verify current
# price at render.com/pricing#postgresql) on purpose: real product data
# starts going in immediately, and Render's free Postgres is hard-deleted
# 30 days after creation with zero backups. Any paid tier gets automatic
# point-in-time recovery (3-day window on a Hobby workspace, 7-day on
# Pro+) from day one - see DEPLOYMENT_PLAN.md for detail.
#
# The web service stays on `plan: free` for now - it holds no data itself
# (everything persists in the database above or in Cloudinary), so the
# only free-tier tradeoff there is a 10-30s cold start after 15 min idle.
# Bump this to `starter` (no downtime, just edit + re-apply the Blueprint)
# once you're ready for always-on / real customer traffic.
services:
  - type: web
    name: girnar-gifts-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    preDeployCommand: "alembic upgrade head"
    envVars:
      - key: ENV
        value: production
      - key: APP_NAME
        value: Girnar Gifts API
      - key: POSTGRES_SERVER
        fromDatabase:
          name: girnar-gifts-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: girnar-gifts-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: girnar-gifts-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: girnar-gifts-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: girnar-gifts-db
          property: database
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: CORS_ORIGINS
        value: https://girnargifts.com,https://www.girnargifts.com
      - key: RAZORPAY_RECEIPT_PREFIX
        value: girnar_
      - key: CLOUDINARY_FOLDER
        value: girnar-gifts
      - key: BRAND_NAME
        value: Girnar Gifts
      - key: BRAND_SUPPORT_EMAIL
        value: support@girnargifts.com
      # Secrets - set in the Render dashboard after the first deploy, do NOT commit:
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: BRAND_GSTIN
        sync: false

databases:
  - name: girnar-gifts-db
    databaseName: girnar_gifts
    region: singapore
    plan: basic-256mb
