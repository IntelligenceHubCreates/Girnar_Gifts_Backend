# Render Blueprint for Girnar Gifts backend.
#
# Workspace is on Render Pro, which raises Postgres PITR retention to 7
# days (vs 3 on Hobby) - applies automatically, nothing to configure here.
#
# The database is on a PAID plan (basic-256mb, ~$6-7/mo - verify current
# price at render.com/pricing#postgresql) on purpose: real product data
# starts going in immediately, and Render's free Postgres is hard-deleted
# 30 days after creation with zero backups.
#
# Web service is on `starter` (always-on, no cold starts) - the client
# starts adding products and testing the live site immediately, so the
# free tier's 10-30s cold-start-after-idle isn't worth the confusion
# during that.
#
# No preDeployCommand: app_entrypoint.sh already runs
# `alembic upgrade head` on every container boot, before starting uvicorn,
# which happens on every deploy regardless (this is the same mechanism
# that's been applying migrations in local dev all along) - redundant to
# add it back now that `starter` supports it. Revisit only if this ever
# moves to multiple instances, where migrating from every instance on
# every boot could race.
services:
  - type: web
    name: girnar-gifts-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: APP_NAME
        value: Girnar Gifts API
      - key: POSTGRES_SERVER
        fromDatabase:
          name: girnar-gifts-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: girnar-gifts-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: girnar-gifts-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: girnar-gifts-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: girnar-gifts-db
          property: database
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: CORS_ORIGINS
        value: https://girnargifts.com,https://www.girnargifts.com
      - key: RAZORPAY_RECEIPT_PREFIX
        value: girnar_
      - key: CLOUDINARY_FOLDER
        value: girnar-gifts
      - key: BRAND_NAME
        value: Girnar Gifts
      - key: BRAND_SUPPORT_EMAIL
        value: support@girnargifts.com
      # Secrets - set in the Render dashboard after the first deploy, do NOT commit:
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: BRAND_GSTIN
        sync: false

databases:
  - name: girnar-gifts-db
    databaseName: girnar_gifts
    region: singapore
    plan: basic-256mb
